<!DOCTYPE html>
<html>
<head>
  <title>Карткова гра</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #1a472a;
      color: white;
      padding: 10px;
    }
    button {
      padding: 14px 24px;
      margin: 8px;
      font-size: 16px;
      background: gold;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    .log {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      height: 150px;
      overflow-y: auto;
      margin-top: 15px;
      font-size: 12px;
    }
    .players-board {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }
    .player-card {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      min-width: 100px;
      text-align: center;
    }
    .player-card.current {
      border: 3px solid gold;
    }
    .open-card {
      font-size: 28px;
      background: white;
      color: black;
      display: inline-block;
      padding: 8px 15px;
      border-radius: 10px;
      margin: 8px 0;
    }
    .big-card {
      background: white;
      color: black;
      display: inline-block;
      padding: 15px 25px;
      border-radius: 10px;
      font-size: 32px;
      font-weight: bold;
      margin: 10px;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 15px 0;
    }
    .phase-panel {
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 15px;
      margin: 10px 0;
      text-align: center;
    }
  </style>
</head>
<body>
<h1>🎴 КАРТКОВА ГРА</h1>

<div id="lobby">
  <button onclick="createGame()">Створити гру</button><br>
  <input id="roomCode" placeholder="Код кімнати">
  <button onclick="joinGame()">Приєднатись</button>
  <div id="error" style="color:red;"></div>
</div>

<div id="game" style="display:none;">
  <div>Кімната: <b id="roomId"></b> <button onclick="copyCode()">Копіювати</button></div>
  <div id="players"></div>
  <div id="gameArea"></div>
  <div class="log" id="log"></div>
</div>

<script>
  const socket = io();
  let roomId = null;
  let gameState = null;
  let drawnCard = null;

  function addLog(msg) {
    const log = document.getElementById('log');
    if (log) log.innerHTML += `<p>${msg}</p>`;
    log.scrollTop = log.scrollHeight;
  }

  function createGame() { socket.emit('createGame'); }
  function joinGame() { socket.emit('joinGame', document.getElementById('roomCode').value.trim().toUpperCase()); }
  function copyCode() { navigator.clipboard.writeText(roomId); }

  socket.on('gameCreated', (id) => {
    roomId = id;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = id;
    addLog('✅ Кімнату створено! Код: ' + id);
  });

  socket.on('joined', (id) => {
    roomId = id;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = id;
    addLog('✅ Приєднано до кімнати!');
  });

  socket.on('playerJoined', (data) => {
    document.getElementById('players').innerHTML = `👥 Гравці: ${data.players.map(p => p.name).join(', ')} (${data.count}/6)`;
    if (data.count >= 2 && !document.getElementById('startBtn')) {
      const btn = document.createElement('button');
      btn.id = 'startBtn';
      btn.textContent = '🚀 Почати гру';
      btn.onclick = () => socket.emit('startGame', roomId);
      document.getElementById('players').appendChild(btn);
    }
  });

  socket.on('gameStarted', () => {
    addLog('🎮 ГРА ПОЧАЛАСЯ!');
    document.getElementById('gameArea').innerHTML = '<div id="gameInner"></div>';
  });

  socket.on('updateState', (state) => {
    gameState = state;
    if (state.log && state.log.length) addLog(state.log[state.log.length - 1]);
    renderGame();
  });

  socket.on('yourTurn', (data) => {
    if (data.playerId === socket.id) {
      if (data.phase === 'redraw') {
        addLog(`🎯 ВАША ЧЕРГА! Фаза перекладання`);
        showRedrawPanel(data);
      } else if (data.phase === 'drawing') {
        addLog(`🎯 ВАША ЧЕРГА! Натисніть "Взяти карту"`);
        showDrawButton();
      }
    } else {
      addLog(`🔄 Ходить: ${data.playerName} (${data.phase === 'redraw' ? 'перекладає' : 'тягне карту'})`);
    }
    renderGame();
  });

  socket.on('cardDrawn', (data) => {
    drawnCard = data.card;
    addLog(`🎴 Ви витягнули: ${data.card.value}${data.card.suit}`);
    showPlacePanel(data);
  });

  function renderGame() {
    if (!gameState) return;
    const container = document.getElementById('gameInner');
    if (!container) return;
    
    let html = '<div class="players-board">';
    for (let i = 0; i < gameState.players.length; i++) {
      const p = gameState.players[i];
      const isCurrent = gameState.currentTurn === i;
      html += `<div class="player-card ${isCurrent ? 'current' : ''}">
        <b>${p.name}</b><br>
        <div class="open-card">${p.openCard?.value || '?'}${p.openCard?.suit || ''}</div>
        <div>🔒 ${p.hidden?.length || 0}</div>
        <div>📋 ${p.hand?.length || 0}</div>
      </div>`;
    }
    html += '</div>';
    
    const me = gameState.players.find(p => p.id === socket.id);
    if (me && me.hand && me.hand.length > 0) {
      html += `<div style="background:rgba(0,0,0,0.4); padding:10px; border-radius:10px; margin-top:10px;">
        <b>🎴 Ваші карти на руках:</b><br>
        ${me.hand.map(c => `<span style="background:white; color:black; padding:5px 10px; margin:3px; display:inline-block; border-radius:8px;">${c.value}${c.suit}</span>`).join('')}
      </div>`;
    }
    
    container.innerHTML = html;
  }

  function showRedrawPanel(data) {
    const container = document.getElementById('gameInner');
    if (!container) return;
    
    let html = `<div class="phase-panel">
      <div class="big-card">${gameState.players.find(p => p.id === data.playerId)?.openCard?.value || '?'}${gameState.players.find(p => p.id === data.playerId)?.openCard?.suit || ''}</div>
      <div class="action-buttons">`;
    
    if (data.canRedraw && data.redrawTargets) {
      for (let t of data.redrawTargets) {
        html += `<button onclick="redrawCard('${t.id}')">🔄 Перекласти ${t.name} (${t.openCard.value}${t.openCard.suit})</button>`;
      }
    }
    html += `<button onclick="skipRedraw()">⏭️ Пропустити</button>`;
    html += `</div></div>`;
    container.innerHTML += html;
  }

  function showDrawButton() {
    const container = document.getElementById('gameInner');
    if (!container) return;
    if (document.getElementById('drawBtn')) return;
    
    const btn = document.createElement('button');
    btn.id = 'drawBtn';
    btn.textContent = '🎴 ВЗЯТИ КАРТУ';
    btn.onclick = () => {
      socket.emit('drawCard', roomId);
      btn.remove();
    };
    container.appendChild(btn);
  }

  function showPlacePanel(data) {
    const container = document.getElementById('gameInner');
    if (!container) return;
    
    let html = `<div class="phase-panel">
      <div class="big-card">${data.card.value}${data.card.suit}</div>
      <div class="action-buttons">`;
    
    if (data.canPlaceToOthers && data.placeTargets) {
      for (let t of data.placeTargets) {
        html += `<button onclick="placeOnOther('${t.id}')">📤 Покласти ${t.name} (${t.openCard.value}${t.openCard.suit})</button>`;
      }
    }
    
    if (data.canPlaceToSelf) {
      html += `<button onclick="placeOnSelf()">📤 Покласти собі</button>`;
    }
    
    html += `<button onclick="takeToHand()">🤚 ЗАБРАТИ СОБІ</button>`;
    html += `</div></div>`;
    container.innerHTML += html;
  }

  function redrawCard(targetId) { socket.emit('redrawCard', roomId, targetId); }
  function skipRedraw() { socket.emit('skipRedraw', roomId); }
  function takeToHand() { socket.emit('takeToHand', roomId); drawnCard = null; }
  function placeOnSelf() { socket.emit('placeOnSelf', roomId); drawnCard = null; }
  function placeOnOther(targetId) { socket.emit('placeOnOther', roomId, targetId); drawnCard = null; }

  socket.on('error', (msg) => {
    const err = document.getElementById('error');
    if (err) { err.textContent = msg; setTimeout(() => err.textContent = '', 3000); }
    addLog(`❌ ${msg}`);
  });
</script>
</body>
</html>

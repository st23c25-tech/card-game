<!DOCTYPE html>
<html>
<head>
  <title>Карткова гра - повні правила</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
      min-height: 100vh;
      color: white;
      padding: 10px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 15px; font-size: 1.6em; }
    button {
      padding: 12px 20px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }
    .action-btn {
      background: #2196F3;
      color: white;
      padding: 14px 24px;
      min-width: 140px;
    }
    .game-area {
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 15px;
      margin-top: 15px;
    }
    .players-board {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .player-board {
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 10px;
      min-width: 120px;
      text-align: center;
    }
    .player-board.current {
      border: 3px solid gold;
    }
    .open-card {
      font-size: 32px;
      background: white;
      color: black;
      display: inline-block;
      padding: 8px 16px;
      border-radius: 10px;
      margin: 8px 0;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin: 15px 0;
    }
    .log {
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎴 КАРТКОВА ГРА 🎴</h1>
  <div id="game"></div>
  <div class="log" id="log"></div>
</div>

<script>
  const socket = io();
  let currentRoomId = null;
  let gameState = null;
  let drawnCard = null;
  
  function addLog(msg) {
    const logDiv = document.getElementById('log');
    logDiv.innerHTML += `<p>${msg}</p>`;
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  
  // Початкова реєстрація
  const roomCode = prompt('Введіть код кімнати (або створіть нову, написавши "new"):');
  if (roomCode === 'new') {
    socket.emit('createGame');
  } else {
    socket.emit('joinGame', roomCode);
  }
  
  socket.on('gameCreated', (roomId) => {
    currentRoomId = roomId;
    addLog(`✅ Створено кімнату: ${roomId}. Дайте цей код друзям!`);
  });
  
  socket.on('joined', (roomId) => {
    currentRoomId = roomId;
    addLog(`✅ Приєднано до кімнати: ${roomId}`);
  });
  
  socket.on('gameStarted', (data) => {
    addLog(`🎮 Гра почалась! Козир: ${data.trump.value}${data.trump.suit}`);
    addLog(`🃏 У вас ${data.hiddenCards.length} закритих карт`);
  });
  
  socket.on('redrawPhaseStart', (data) => {
    addLog(`🔄 ${data.message}`);
  });
  
  socket.on('redrawTurn', (data) => {
    if (data.playerId === socket.id) {
      addLog(`🎯 ВАША ЧЕРГА перекласти карту! Ваша карта: ${data.openCard.value}${data.openCard.suit}`);
      // Показати кнопки для перекладання
      renderRedrawButtons();
    }
  });
  
  socket.on('updateState', (state) => {
    gameState = state;
    renderGame();
  });
  
  socket.on('needDecision', (data) => {
    drawnCard = data.card;
    renderDecisionButtons();
  });
  
  socket.on('nextTurn', (data) => {
    if (data.playerId === socket.id) {
      addLog(`🔄 ВАША ЧЕРГА! Натисніть "Тягнути карту"`);
    } else {
      addLog(`🔄 Черга: ${data.playerName}`);
    }
    renderTurnButton();
  });
  
  function renderGame() {
    if (!gameState) return;
    const container = document.getElementById('game');
    let html = `<div class="game-area">`;
    html += `<div class="players-board">`;
    for (let p of gameState.players) {
      const isCurrent = gameState.currentDrawPlayer !== undefined && 
                        gameState.players[gameState.currentDrawPlayer]?.id === p.id;
      html += `<div class="player-board ${isCurrent ? 'current' : ''}">
        <strong>${p.name}</strong>
        <div class="open-card">${p.openCard?.value || '?'}${p.openCard?.suit || ''}</div>
        <div>🔒 ${p.hidden?.length || 0}</div>
      </div>`;
    }
    html += `</div></div>`;
    container.innerHTML = html;
  }
  
  function renderTurnButton() {
    const container = document.getElementById('game');
    if (gameState?.phase === 'drawing' && 
        gameState.players[gameState.currentDrawPlayer]?.id === socket.id &&
        !drawnCard) {
      container.innerHTML += `<div class="action-buttons">
        <button class="action-btn" onclick="drawCard()">🎴 Тягнути карту</button>
      </div>`;
    }
  }
  
  function renderDecisionButtons() {
    const container = document.getElementById('game');
    container.innerHTML += `<div class="action-buttons">
      <button class="action-btn" onclick="placeOnPlayer()">📤 Покласти на гравця</button>
      <button class="action-btn" onclick="takeToHand()">🤚 Забрати собі</button>
    </div>`;
  }
  
  function renderRedrawButtons() {
    const container = document.getElementById('game');
    const players = gameState?.players.filter(p => p.id !== socket.id && p.openCard) || [];
    let html = `<div class="action-buttons">`;
    for (let p of players) {
      html += `<button class="action-btn" onclick="redrawCard('${p.id}')">🔄 Перекласти на ${p.name}</button>`;
    }
    html += `<button class="action-btn" onclick="skipRedraw()">⏭️ Пропустити</button>`;
    html += `</div>`;
    container.innerHTML += html;
  }
  
  function drawCard() { socket.emit('drawCard', currentRoomId); }
  function takeToHand() { socket.emit('takeToHand', currentRoomId); drawnCard = null; renderGame(); }
  function placeOnPlayer() {
    const target = prompt("Введіть ім'я гравця:");
    if (target && gameState) {
      const targetPlayer = gameState.players.find(p => p.name === target);
      if (targetPlayer) socket.emit('placeCard', currentRoomId, targetPlayer.id);
    }
  }
  function redrawCard(targetId) { socket.emit('redrawCard', currentRoomId, targetId); }
  function skipRedraw() { socket.emit('skipRedraw', currentRoomId); }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Карткова гра</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #1a472a;
      color: white;
      padding: 10px;
    }
    button {
      padding: 12px 20px;
      margin: 5px;
      font-size: 16px;
      background: gold;
      border: none;
      border-radius: 10px;
      font-weight: bold;
    }
    .log {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      height: 200px;
      overflow-y: auto;
      margin-top: 15px;
      font-size: 12px;
    }
    .players {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 15px 0;
    }
    .player {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      min-width: 100px;
      text-align: center;
    }
    .player.current {
      border: 3px solid gold;
    }
    .open-card {
      font-size: 24px;
      background: white;
      color: black;
      padding: 5px 10px;
      border-radius: 8px;
      display: inline-block;
      margin: 5px 0;
    }
  </style>
</head>
<body>
<h1>КАРТКОВА ГРА</h1>

<div id="lobby">
  <button onclick="createGame()">Створити гру</button><br>
  <input id="roomCode" placeholder="Код кімнати">
  <button onclick="joinGame()">Приєднатись</button>
  <div id="error" style="color:red;"></div>
</div>

<div id="game" style="display:none;">
  <div>Кімната: <b id="roomId"></b></div>
  <div id="players"></div>
  <div id="gameArea"></div>
  <div class="log" id="log"></div>
</div>

<script>
  const socket = io();
  let roomId = null;
  let gameState = null;
  let drawnCard = null;

  function log(msg) {
    const l = document.getElementById('log');
    if (l) l.innerHTML += `<p>${msg}</p>`;
  }

  function createGame() { socket.emit('createGame'); }
  function joinGame() { socket.emit('joinGame', document.getElementById('roomCode').value.trim().toUpperCase()); }

  socket.on('gameCreated', (id) => {
    roomId = id;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = id;
    log('Створено кімнату: ' + id);
  });

  socket.on('joined', (id) => {
    roomId = id;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = id;
    log('Приєднано до кімнати');
  });

  socket.on('playerJoined', (data) => {
    document.getElementById('players').innerHTML = 'Гравці: ' + data.players.map(p => p.name).join(', ') + ' (' + data.count + '/6)';
    if (data.count >= 2 && !document.getElementById('startBtn')) {
      const btn = document.createElement('button');
      btn.id = 'startBtn';
      btn.textContent = 'Почати гру';
      btn.onclick = () => socket.emit('startGame', roomId);
      document.getElementById('players').appendChild(btn);
    }
  });

  socket.on('gameStarted', () => {
    log('ГРА ПОЧАЛАСЯ!');
    document.getElementById('gameArea').innerHTML = '<div id="gameInner"></div>';
  });

  socket.on('updateState', (state) => {
    gameState = state;
    renderGame();
  });

  socket.on('yourTurn', (data) => {
    if (data.playerId === socket.id) {
      log('ВАША ЧЕРГА!');
      showDrawButton();
    } else {
      log('Черга: ' + data.playerName);
    }
  });

  socket.on('cardDrawn', (data) => {
    drawnCard = data.card;
    log('Ви витягнули: ' + data.card.value + data.card.suit);
    showActionButtons();
  });

  function renderGame() {
    if (!gameState) return;
    let html = '<div class="players">';
    for (let i = 0; i < gameState.players.length; i++) {
      const p = gameState.players[i];
      html += `<div class="player ${gameState.currentTurn === i ? 'current' : ''}">
        <b>${p.name}</b><br>
        <div class="open-card">${p.openCard?.value || '?'}${p.openCard?.suit || ''}</div>
        <div>🔒 ${p.hidden?.length || 0}</div>
      </div>`;
    }
    html += '</div>';
    document.getElementById('gameInner').innerHTML = html;
  }

  function showDrawButton() {
    const container = document.getElementById('gameInner');
    if (!container || document.getElementById('drawBtn')) return;
    const btn = document.createElement('button');
    btn.id = 'drawBtn';
    btn.textContent = 'ТЯГНУТИ КАРТУ';
    btn.onclick = () => {
      socket.emit('drawCard', roomId);
      btn.remove();
    };
    container.appendChild(btn);
  }

  function showActionButtons() {
    const container = document.getElementById('gameInner');
    if (!container || !gameState) return;
    
    let html = `<div style="background:gold; padding:15px; border-radius:10px; margin-top:10px;">
      <div style="background:white; color:black; display:inline-block; padding:10px 20px; border-radius:8px; font-size:24px;">${drawnCard.value}${drawnCard.suit}</div>`;
    
    for (let p of gameState.players) {
      if (p.id !== socket.id && p.openCard) {
        html += `<button onclick="placeCard('${p.id}')">Покласти на ${p.name}</button>`;
      }
    }
    html += `<button onclick="takeCard()">Забрати собі</button>`;
    html += `</div>`;
    container.innerHTML += html;
  }

  function takeCard() { socket.emit('takeCard', roomId); drawnCard = null; }
  function placeCard(targetId) { socket.emit('placeCard', roomId, targetId); drawnCard = null; }

  socket.on('error', (msg) => {
    document.getElementById('error').textContent = msg;
    setTimeout(() => document.getElementById('error').textContent = '', 3000);
  });
</script>
</body>
</html>

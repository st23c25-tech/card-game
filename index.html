<!DOCTYPE html>
<html>
<head>
  <title>Карткова гра</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
      min-height: 100vh;
      color: white;
      padding: 10px;
    }
    button {
      padding: 14px 20px;
      margin: 8px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      background: gold;
    }
    .action-btn {
      background: #2196F3;
      color: white;
      padding: 14px 24px;
      min-width: 150px;
    }
    .players-board {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin: 15px 0;
    }
    .player-board {
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 10px;
      min-width: 100px;
      text-align: center;
    }
    .player-board.current {
      border: 3px solid gold;
    }
    .open-card {
      font-size: 28px;
      background: white;
      color: black;
      display: inline-block;
      padding: 6px 12px;
      border-radius: 10px;
      margin: 8px 0;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin: 15px 0;
    }
    .log {
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 15px;
    }
    input {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      text-align: center;
    }
    .drawn-card {
      background: #ffd700;
      color: #1a472a;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      margin: 15px 0;
    }
    .big-card {
      background: white;
      color: black;
      display: inline-block;
      padding: 15px 25px;
      border-radius: 10px;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div style="max-width: 800px; margin: 0 auto;">
  <h1 style="text-align:center;">🎴 КАРТКОВА ГРА 🎴</h1>
  
  <div id="lobby" style="text-align:center; background:rgba(0,0,0,0.5); border-radius:20px; padding:30px;">
    <button onclick="createGame()">➕ Створити гру</button><br>
    <input type="text" id="roomCode" placeholder="Код кімнати">
    <button onclick="joinGame()">🔗 Приєднатися</button>
    <div id="errorMsg" style="color:red; margin-top:10px;"></div>
  </div>
  
  <div id="game" style="display:none;">
    <div style="text-align:center;">🏠 Кімната: <b id="roomId"></b> <button onclick="copyCode()">📋</button></div>
    <div id="playersList" style="background:rgba(0,0,0,0.3); border-radius:15px; padding:10px; margin:10px 0;"></div>
    <div id="gameArea"></div>
    <div id="log" class="log"></div>
  </div>
</div>

<script>
  const socket = io();
  let currentRoomId = null;
  let gameState = null;
  let currentCard = null;
  let canPlaceOnOther = false;
  let canPlaceOnSelf = false;
  
  function addLog(msg) {
    const logDiv = document.getElementById('log');
    if (logDiv) logDiv.innerHTML += `<p>${msg}</p>`;
  }
  
  function createGame() { socket.emit('createGame'); }
  function joinGame() {
    const code = document.getElementById('roomCode').value.trim().toUpperCase();
    if (!code) return;
    socket.emit('joinGame', code);
  }
  function copyCode() {
    if (currentRoomId) navigator.clipboard.writeText(currentRoomId);
  }
  
  socket.on('gameCreated', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = roomId;
    addLog(`Створено кімнату: ${roomId}`);
  });
  
  socket.on('joined', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = roomId;
    addLog(`Приєднано до кімнати: ${roomId}`);
  });
  
  socket.on('playerJoined', (data) => {
    const div = document.getElementById('playersList');
    div.innerHTML = `<strong>Гравці (${data.count}/6):</strong> ` + data.players.map(p => p.name).join(', ');
    if (data.count >= 2) {
      if (!document.getElementById('startBtn')) {
        const startBtn = document.createElement('button');
        startBtn.id = 'startBtn';
        startBtn.textContent = '🚀 Почати гру';
        startBtn.onclick = () => socket.emit('startGame', currentRoomId);
        startBtn.style.margin = '10px auto';
        startBtn.style.display = 'block';
        div.appendChild(startBtn);
      }
    }
  });
  
  socket.on('gameStarted', (data) => {
    addLog(`🎮 ГРА ПОЧАЛАСЯ! У вас ${data.hiddenCards.length} закритих карт`);
    document.getElementById('gameArea').innerHTML = '<div id="gameAreaInner"></div>';
  });
  
  socket.on('updateState', (state) => {
    gameState = state;
    if (state.log && state.log.length) addLog(state.log[state.log.length - 1]);
    renderGame();
  });
  
  socket.on('nextTurn', (data) => {
    if (data.playerId === socket.id) {
      addLog(`🔄 ВАША ЧЕРГА! Натисніть "Тягнути карту"`);
      showDrawButton();
    } else {
      addLog(`🔄 Черга: ${data.playerName}`);
    }
    renderGame();
  });
  
  socket.on('needDecision', (data) => {
    currentCard = data.card;
    canPlaceOnOther = data.canPlaceAnywhere;
    canPlaceOnSelf = data.canPlaceOnSelf;
    showDecisionButtons();
  });
  
  socket.on('continueTurn', () => {
    addLog(`🔄 Продовжуйте хід! Тягніть наступну карту`);
    showDrawButton();
    renderGame();
  });
  
  function renderGame() {
    if (!gameState) return;
    const container = document.getElementById('gameAreaInner');
    if (!container) return;
    
    let html = `<div class="players-board">`;
    for (let p of gameState.players) {
      const isCurrent = gameState.currentDrawPlayer !== undefined && gameState.players[gameState.currentDrawPlayer]?.id === p.id;
      html += `<div class="player-board ${isCurrent ? 'current' : ''}">
        <strong>${p.name}</strong>
        <div class="open-card">${p.openCard?.value || '?'}${p.openCard?.suit || ''}</div>
        <div>🔒 ${p.hidden?.length || 0}</div>
      </div>`;
    }
    html += `</div>`;
    
    const me = gameState.players.find(p => p.id === socket.id);
    if (me && me.hand && me.hand.length > 0) {
      html += `<div style="background:rgba(0,0,0,0.4); border-radius:15px; padding:10px; margin-top:10px;">
        <strong>🎴 Ваші карти на руках:</strong><br>
        ${me.hand.map(c => `<span style="background:white; color:black; padding:5px 10px; margin:3px; display:inline-block; border-radius:8px;">${c.value}${c.suit}</span>`).join('')}
      </div>`;
    }
    
    container.innerHTML = html;
  }
  
  function showDrawButton() {
    const container = document.getElementById('gameAreaInner');
    if (container && !currentCard) {
      container.innerHTML += `<div class="action-buttons"><button class="action-btn" onclick="drawCard()">🎴 Тягнути карту</button></div>`;
    }
  }
  
  function showDecisionButtons() {
    const container = document.getElementById('gameAreaInner');
    if (!container || !currentCard) return;
    
    const players = gameState?.players.filter(p => p.id !== socket.id && p.openCard) || [];
    let html = `<div class="drawn-card">
      <div class="big-card">${currentCard.value}${currentCard.suit}</div>
      <div class="action-buttons">`;
    
    for (let p of players) {
      if (canPlaceOnOther) {
        html += `<button class="action-btn" onclick="placeOnOther('${p.id}')">📤 Покласти на ${p.name}</button>`;
      }
    }
    
    if (canPlaceOnSelf) {
      html += `<button class="action-btn" onclick="placeOnSelf()">📤 Покласти на себе</button>`;
    }
    
    html += `<button class="action-btn" onclick="takeCard()">🤚 Забрати собі</button>`;
    html += `</div></div>`;
    
    container.innerHTML += html;
  }
  
  function drawCard() { socket.emit('drawCard', currentRoomId); }
  function takeCard() { socket.emit('takeToHand', currentRoomId); currentCard = null; }
  function placeOnOther(targetId) { socket.emit('placeOnOther', currentRoomId, targetId); currentCard = null; }
  function placeOnSelf() { socket.emit('placeOnSelf', currentRoomId); currentCard = null; }
  
  socket.on('error', (msg) => {
    const errDiv = document.getElementById('errorMsg');
    if (errDiv) { errDiv.textContent = msg; setTimeout(() => errDiv.textContent = '', 3000); }
  });
</script>
</body>
</html>

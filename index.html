<!DOCTYPE html>
<html>
<head>
  <title>🎴 Карткова гра - повні правила</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
      min-height: 100vh;
      color: white;
      padding: 12px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 1.8em;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    #lobby {
      background: rgba(0,0,0,0.7);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      margin: 50px auto;
    }
    input, button {
      padding: 14px 20px;
      margin: 10px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    input {
      background: white;
      color: black;
      width: 80%;
      max-width: 250px;
      text-align: center;
    }
    button {
      background: gold;
      color: #1a472a;
      font-weight: bold;
      transition: transform 0.1s;
    }
    button:active {
      transform: scale(0.97);
    }
    #game {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 15px;
      display: none;
    }
    .room-info {
      text-align: center;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .room-code {
      background: gold;
      color: #1a472a;
      padding: 8px 16px;
      border-radius: 15px;
      font-weight: bold;
      display: inline-block;
      font-size: 20px;
    }
    .players {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 12px;
      margin: 15px 0;
    }
    .players h3 {
      margin-bottom: 8px;
      font-size: 16px;
    }
    .players-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }
    .player-card {
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 14px;
    }
    .trump {
      text-align: center;
      font-size: 20px;
      margin: 15px 0;
    }
    .trump-card {
      display: inline-block;
      background: white;
      color: black;
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 28px;
      font-weight: bold;
    }
    .game-area {
      margin-top: 15px;
    }
    .players-board {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 20px;
    }
    .player-board {
      background: rgba(0,0,0,0.4);
      border-radius: 15px;
      padding: 10px;
      min-width: 110px;
      text-align: center;
    }
    .player-board.current {
      border: 3px solid gold;
      box-shadow: 0 0 8px gold;
    }
    .open-card {
      font-size: 28px;
      background: white;
      color: black;
      display: inline-block;
      padding: 6px 12px;
      border-radius: 10px;
      margin: 8px 0;
    }
    .hidden-count {
      font-size: 12px;
      color: #ccc;
    }
    .your-area {
      background: rgba(0,0,0,0.5);
      border-radius: 15px;
      padding: 12px;
      margin-top: 15px;
    }
    .your-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin: 12px 0;
    }
    .card {
      background: white;
      color: black;
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }
    .drawn-card {
      background: #ffd700;
      color: #1a472a;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
      margin: 15px 0;
    }
    .drawn-card .card {
      font-size: 48px;
      display: inline-block;
      background: white;
      padding: 15px 25px;
    }
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      margin: 15px 0;
    }
    .action-btn {
      background: #2196F3;
      color: white;
      padding: 14px 24px;
      font-size: 16px;
      border-radius: 30px;
      min-width: 150px;
    }
    .action-btn:active {
      transform: scale(0.96);
    }
    .turn-indicator {
      background: rgba(255,215,0,0.3);
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      margin: 10px 0;
      font-size: 18px;
      font-weight: bold;
    }
    .log {
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      padding: 10px;
      height: 150px;
      overflow-y: auto;
      font-size: 12px;
      margin-top: 15px;
    }
    .log p {
      padding: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #startBtn {
      background: #4CAF50;
      color: white;
      font-size: 20px;
      padding: 14px 30px;
      margin-top: 15px;
      width: 100%;
    }
    .waiting {
      text-align: center;
      font-size: 16px;
      color: gold;
      padding: 15px;
    }
    .error-text {
      color: #ff6b6b;
      margin-top: 10px;
      font-size: 14px;
    }
    @media (max-width: 600px) {
      .action-btn {
        min-width: 130px;
        padding: 12px 18px;
        font-size: 14px;
      }
      .open-card {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎴 КАРТКОВА ГРА 🎴</h1>
  
  <div id="lobby">
    <h2>🎮 Створи або приєднайся</h2>
    <button onclick="createGame()">➕ Створити гру</button>
    <br>
    <input type="text" id="roomCode" placeholder="Код кімнати" autocomplete="off">
    <button onclick="joinGame()">🔗 Приєднатися</button>
    <div id="lobbyError" class="error-text"></div>
  </div>
  
  <div id="game">
    <div class="room-info">
      🏠 Кімната: <span class="room-code" id="roomId"></span>
      <button onclick="copyRoomCode()" style="margin-left: 8px; padding: 6px 12px; font-size: 14px;">📋 Копія</button>
    </div>
    <div class="players">
      <h3>👥 Гравці (<span id="playerCount">0</span>/6)</h3>
      <div class="players-list" id="playersList"></div>
    </div>
    <div id="gameArea">
      <div class="waiting">⚡ Очікуємо гравців... (мінімум 2)</div>
      <button id="startBtn" onclick="startGame()">🚀 Почати гру</button>
    </div>
    <div class="log" id="log"></div>
  </div>
</div>

<script>
  const socket = io();
  let currentRoomId = null;
  let gameState = null;
  let myId = null;
  let drawnCard = null;
  let waitingForDecision = false;
  let inRedrawPhase = false;
  
  function addLog(message) {
    const logDiv = document.getElementById('log');
    const p = document.createElement('p');
    p.textContent = message;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }
  
  function createGame() { socket.emit('createGame'); }
  
  function joinGame() {
    const code = document.getElementById('roomCode').value.trim().toUpperCase();
    if (!code) {
      document.getElementById('lobbyError').textContent = '❌ Введіть код кімнати';
      return;
    }
    socket.emit('joinGame', code);
  }
  
  function copyRoomCode() {
    if (currentRoomId) {
      navigator.clipboard.writeText(currentRoomId);
      addLog('📋 Код скопійовано!');
    }
  }
  
  function startGame() {
    if (currentRoomId) {
      socket.emit('startGame', currentRoomId);
      addLog('🚀 Запуск гри...');
    }
  }
  
  socket.on('gameCreated', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = roomId;
    addLog(`✅ Ви створили кімнату ${roomId}`);
    addLog('📤 Дайте цей код друзям, щоб вони приєдналися!');
  });
  
  socket.on('joined', (roomId) => {
    currentRoomId = roomId;
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    document.getElementById('roomId').textContent = roomId;
    addLog(`✅ Ви приєдналися до кімнати ${roomId}`);
  });
  
  socket.on('playerJoined', (data) => {
    document.getElementById('playerCount').textContent = data.count;
    const playersDiv = document.getElementById('playersList');
    playersDiv.innerHTML = data.players.map(p => `<div class="player-card">${p.name}</div>`).join('');
    addLog(`👋 Гравців у кімнаті: ${data.count}`);
    if (data.count >= 2) {
      document.getElementById('startBtn').style.display = 'block';
      document.querySelector('.waiting').style.display = 'none';
    }
  });
  
  socket.on('gameStarted', (data) => {
    myId = socket.id;
    addLog(`🎮 ГРА ПОЧАЛАСЯ! Козир: ${data.trump.value}${data.trump.suit}`);
    addLog(`🃏 У тебе ${data.hiddenCards.length} закритих карт`);
    document.getElementById('gameArea').innerHTML = '<div class="game-area" id="gameAreaInner"></div>';
  });
  
  socket.on('redrawPhaseStart', (data) => {
    inRedrawPhase = true;
    addLog(`🔄 ${data.message}`);
  });
  
  socket.on('redrawTurn', (data) => {
    if (data.playerId === socket.id) {
      addLog(`🎯 ВАША ЧЕРГА перекласти карту! Ваша карта: ${data.openCard.value}${data.openCard.suit}`);
      renderRedrawButtons();
    }
  });
  
  socket.on('updateState', (state) => {
    gameState = state;
    if (state.log && state.log.length) {
      const lastMsg = state.log[state.log.length - 1];
      if (lastMsg) addLog(lastMsg);
    }
    renderGame();
  });
  
  socket.on('cardDrawn', (data) => {
    if (data.playerId !== socket.id) {
      addLog(`🎴 Гравець витягнув карту`);
    }
  });
  
  socket.on('needDecision', (data) => {
    drawnCard = data.card;
    waitingForDecision = true;
    addLog(`🎴 Ви витягнули карту: ${data.card.value}${data.card.suit}`);
    renderDecisionButtons();
  });
  
  socket.on('nextTurn', (data) => {
    inRedrawPhase = false;
    waitingForDecision = false;
    drawnCard = null;
    if (data.playerId === socket.id) {
      addLog(`🔄 ВАША ЧЕРГА! Натисніть "Тягнути карту"`);
    } else {
      addLog(`🔄 Черга гравця: ${data.playerName}`);
    }
    renderGame();
    renderTurnButton();
  });
  
  socket.on('gameEnd', (data) => {
    addLog(`🏆 ${data.message}`);
  });
  
  function renderGame() {
    if (!gameState) return;
    const container = document.getElementById('gameAreaInner');
    if (!container) return;
    
    let html = `<div class="trump">🃏 КОЗИР: <span class="trump-card">${gameState.trump.value}${gameState.trump.suit}</span></div>`;
    html += `<div class="players-board">`;
    for (let p of gameState.players) {
      const isCurrent = (gameState.phase === 'drawing' && gameState.currentDrawPlayer !== undefined && gameState.players[gameState.currentDrawPlayer]?.id === p.id);
      html += `<div class="player-board ${isCurrent ? 'current' : ''}">
        <strong>${p.name}</strong>
        <div class="open-card">${p.openCard ? p.openCard.value + p.openCard.suit : '?'}</div>
        <div class="hidden-count">🔒 ${p.hidden?.length || 0}</div>
      </div>`;
    }
    html += `</div>`;
    
    const me = gameState.players.find(p => p.id === socket.id);
    if (me && !inRedrawPhase) {
      html += `<div class="your-area">
        <h3>🎴 Ваші карти на руках:</h3>
        <div class="your-cards">`;
      if (me.hand && me.hand.length > 0) {
        for (let card of me.hand) {
          html += `<div class="card">${card.value}${card.suit}</div>`;
        }
      } else {
        html += `<p style="color:#ccc;">(немає карт на руках)</p>`;
      }
      html += `</div></div>`;
    }
    
    container.innerHTML = html;
  }
  
  function renderTurnButton() {
    if (!gameState || inRedrawPhase) return;
    const container = document.getElementById('gameAreaInner');
    if (gameState.phase === 'drawing' && 
        gameState.players[gameState.currentDrawPlayer]?.id === socket.id &&
        !waitingForDecision && !drawnCard) {
      container.innerHTML += `<div class="action-buttons">
        <button class="action-btn" onclick="drawCard()">🎴 Тягнути карту</button>
      </div>`;
    }
  }
  
  function renderDecisionButtons() {
    const container = document.getElementById('gameAreaInner');
    const players = gameState?.players.filter(p => p.id !== socket.id && p.openCard) || [];
    let html = `<div class="drawn-card">
      <div class="card">${drawnCard.value}${drawnCard.suit}</div>
      <div class="action-buttons">`;
    
    for (let p of players) {
      html += `<button class="action-btn" onclick="placeCard('${p.id}')">📤 Покласти на ${p.name}</button>`;
    }
    html += `<button class="action-btn" onclick="takeCard()">🤚 Забрати собі</button>`;
    html += `</div></div>`;
    container.innerHTML += html;
  }
  
  function renderRedrawButtons() {
    const container = document.getElementById('gameAreaInner');
    const players = gameState?.players.filter(p => p.id !== socket.id && p.openCard) || [];
    let html = `<div class="action-buttons">`;
    for (let p of players) {
      html += `<button class="action-btn" onclick="redrawCard('${p.id}')">🔄 Перекласти на ${p.name}</button>`;
    }
    html += `<button class="action-btn" onclick="skipRedraw()">⏭️ Пропустити</button>`;
    html += `</div>`;
    container.innerHTML += html;
  }
  
  function drawCard() { socket.emit('drawCard', currentRoomId); }
  function takeCard() { socket.emit('takeToHand', currentRoomId); waitingForDecision = false; drawnCard = null; renderGame(); }
  function placeCard(targetId) { socket.emit('placeCard', currentRoomId, targetId); waitingForDecision = false; drawnCard = null; }
  function redrawCard(targetId) { socket.emit('redrawCard', currentRoomId, targetId); }
  function skipRedraw() { socket.emit('skipRedraw', currentRoomId); }
  
  socket.on('error', (msg) => {
    document.getElementById('lobbyError').textContent = msg;
    setTimeout(() => {
      document.getElementById('lobbyError').textContent = '';
    }, 3000);
  });
</script>
</body>
</html>
